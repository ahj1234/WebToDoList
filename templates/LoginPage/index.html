<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='LoginPage/style.css') }}">
    <script src="{{ url_for('static', filename='LoginPage/script.js') }}"></script>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Login Form</h1>
        <form action="/" method="POST">
            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <input type="text" id="username" name="user" placeholder="Enter your username">
            </div>
            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input type="password" id="password" name="passw" placeholder="Enter your password">
            </div>
            <input type="submit" class="btn-primary" value="Login">
        </form>
    </div>
</body>
</html>
